<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ウェブ試験アプリ</title>
    <style>
        body { font-family: sans-serif; padding: 20px; max-width: 600px; margin: auto; }
        .question-container { margin-bottom: 20px; padding: 15px; border: 1px solid #ccc; border-radius: 5px; }
        .choices { display: flex; flex-direction: column; gap: 10px; margin-top: 10px; }
        button { padding: 10px; cursor: pointer; }
        #result { font-weight: bold; margin-top: 20px; font-size: 1.2em; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
</head>
<body>

    <h1>介護日本語評価試験対策アプリ</h1>
    
    <select id="set-selector">
        <option value="data/set01.csv">セット1 (set01.csv)</option>
        <option value="data/set02.csv">セット2 (set02.csv)</option>
        <option value="data/set03.csv">セット3 (set03.csv)</option>
        <option value="data/set04.csv">セット4 (set04.csv)</option>
        <option value="data/set05.csv">セット5 (set05.csv)</option>
        <option value="data/set06.csv">セット6 (set06.csv)</option>
        <option value="data/set07.csv">セット7 (set07.csv)</option>
    </select>
    <button id="load-btn">問題を読み込む</button>

    <div id="quiz-area"></div>
    <button id="submit-btn" style="display:none; margin-top: 20px; width: 100%;">採点する</button>
    <div id="result"></div>

    <script src="app.js"></script>
</body>
</html>
